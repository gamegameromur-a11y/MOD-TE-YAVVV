name: Build Mod

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Extract source zip (if present)
        shell: bash
        run: |
          set -e
          ZIP_FILE="$(find . -maxdepth 2 -type f -iname '*.zip' | head -n 1)"
          if [ -n "$ZIP_FILE" ]; then
            echo "Found source zip: $ZIP_FILE"
            mkdir -p _extracted
            unzip -q -o "$ZIP_FILE" -d _extracted
            ls -la _extracted
          else
            echo "No zip found - assuming source is already in repo."
          fi

      - name: Detect mod directory
        id: detect
        shell: bash
        run: |
          set -e
          MOD_DIR=""
          if [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
            MOD_DIR="."
          else
            MOD_DIR="$(find . -maxdepth 5 -type f \( -name 'build.gradle' -o -name 'build.gradle.kts' \) -not -path '*/build/*' -not -path '*/.gradle/*' -not -path '*/buildSrc/*' | head -n 1 | xargs -r dirname)"
          fi
          if [ -z "$MOD_DIR" ]; then
            echo "ERROR: build.gradle not found." >&2
            exit 1
          fi
          echo "Mod directory: $MOD_DIR"
          echo "mod_dir=$MOD_DIR" >> "$GITHUB_OUTPUT"

      - name: Read mod metadata
        id: meta
        shell: bash
        working-directory: ${{ steps.detect.outputs.mod_dir }}
        run: |
          set -e
          MOD_ID=""; MOD_VERSION=""
          if [ -f "gradle.properties" ]; then
            MOD_ID="$(grep -E '^\s*mod_id\s*=' gradle.properties | head -n1 | sed -E 's/^\s*mod_id\s*=\s*//' | tr -d '\r' | xargs)"
            MOD_VERSION="$(grep -E '^\s*mod_version\s*=' gradle.properties | head -n1 | sed -E 's/^\s*mod_version\s*=\s*//' | tr -d '\r' | xargs)"
          fi
          [ -z "$MOD_ID" ] && MOD_ID="mod"
          [ -z "$MOD_VERSION" ] && MOD_VERSION="1.0.0"
          echo "mod_id=$MOD_ID" >> "$GITHUB_OUTPUT"
          echo "mod_version=$MOD_VERSION" >> "$GITHUB_OUTPUT"

      - name: Download dependency mods from Modrinth
        shell: bash
        working-directory: ${{ steps.detect.outputs.mod_dir }}
        run: |
          set -e
          mkdir -p libs
          # ── Pinned Modrinth CDN URLs (1.21.1 / NeoForge) ─────────────────────────
          urls=(
            "https://cdn.modrinth.com/data/LNytGWDc/versions/UjX6dr61/create-1.21.1-6.0.10.jar"
            "https://cdn.modrinth.com/data/T9PomCSv/versions/g8CObHcP/sable-neoforge-1.21.1-1.1.3.jar"
            "https://cdn.modrinth.com/data/Vg5TIO6d/versions/cpErBxbD/create_connected-1.1.13-mc1.21.1.jar"
            "https://cdn.modrinth.com/data/oWaK0Q19/versions/1sv6OtSz/create-aeronautics-bundled-1.21.1-1.1.3.jar"
          )
          for u in "${urls[@]}"; do
            fname="$(basename "$u")"
            echo "Downloading $fname ..."
            curl -fSL --retry 5 --retry-delay 3 -o "libs/$fname" "$u"
          done
          echo "── libs/ contents ──"
          ls -la libs

      - name: Patch build.gradle to use libs/ instead of remote mavens
        shell: bash
        working-directory: ${{ steps.detect.outputs.mod_dir }}
        run: |
          set -e
          BG="build.gradle"
          [ -f "build.gradle.kts" ] && BG="build.gradle.kts"

          # Comment out every remote Create / Connected / Sable / Aeronautics dep,
          # including any trailing { ... } configuration block on the same statement.
          python3 <<PY
          import re, pathlib
          p = pathlib.Path("$BG")
          s = p.read_text()
          patterns = [
              r'com\.simibubi\.create:[^\s)]+',
              r'com\.hlysine:[^\s)]+',
              r'maven\.modrinth:create-connected:[^\s)]+',
              r'dev\.ryanhcode:[^\s)]+',
              r'maven\.modrinth:sable[^\s)]*',
              r'maven\.modrinth:create-aeronautics[^\s)]*',
          ]
          lines = s.splitlines(keepends=True)
          out = []
          i = 0
          changed = False
          while i < len(lines):
              line = lines[i]
              if any(re.search(pat, line) for pat in patterns) and not line.lstrip().startswith('//'):
                  changed = True
                  # If this line opens a block with '{', swallow lines until matching '}'.
                  depth = line.count('{') - line.count('}')
                  out.append('// [auto-disabled] ' + line)
                  i += 1
                  while depth > 0 and i < len(lines):
                      nxt = lines[i]
                      depth += nxt.count('{') - nxt.count('}')
                      out.append('// [auto-disabled] ' + nxt)
                      i += 1
                  continue
              out.append(line)
              i += 1
          if changed:
              p.write_text(''.join(out))
              print("Disabled remote create/sable/connected/aeronautics coordinates (including block bodies).")
          PY

          # Append a flatDir repo + fileTree compileOnly that pulls everything from libs/.
          cat >> "$BG" <<'GROOVY'

          // ─── Auto-injected by GitHub Actions: use libs/ folder ───────────────────────
          repositories {
              flatDir { dirs 'libs' }
          }
          dependencies {
              compileOnly fileTree(dir: 'libs', include: ['*.jar'])
          }
          GROOVY

          echo "── build.gradle tail ──"
          tail -n 20 "$BG"

      - name: Ensure Gradle wrapper exists
        shell: bash
        working-directory: ${{ steps.detect.outputs.mod_dir }}
        run: |
          set -e
          if [ ! -f "gradlew" ] || [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            GRADLE_VERSION=8.8
            if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
              DETECTED=$(grep -oE 'gradle-[0-9]+\.[0-9]+(\.[0-9]+)?' gradle/wrapper/gradle-wrapper.properties | head -n1 | sed 's/gradle-//')
              [ -n "$DETECTED" ] && GRADLE_VERSION="$DETECTED"
            fi
            echo "Generating wrapper for Gradle $GRADLE_VERSION"
            curl -sSL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
            "/tmp/gradle-dist/gradle-${GRADLE_VERSION}/bin/gradle" wrapper --gradle-version "${GRADLE_VERSION}"
          fi
          chmod +x gradlew

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        working-directory: ${{ steps.detect.outputs.mod_dir }}
        run: ./gradlew build --no-daemon --stacktrace

      - name: Collect final JAR
        id: collect
        shell: bash
        run: |
          set -e
          MOD_DIR="${{ steps.detect.outputs.mod_dir }}"
          MOD_ID="${{ steps.meta.outputs.mod_id }}"
          MOD_VERSION="${{ steps.meta.outputs.mod_version }}"
          mkdir -p output
          JAR=""
          for f in "$MOD_DIR"/build/libs/*.jar; do
            case "$f" in
              *-sources.jar|*-dev.jar|*-javadoc.jar|*-slim.jar) continue ;;
            esac
            JAR="$f"
            break
          done
          if [ -z "$JAR" ]; then
            echo "ERROR: No build output JAR found." >&2
            ls -la "$MOD_DIR/build/libs/" || true
            exit 1
          fi
          FINAL="output/${MOD_ID}-${MOD_VERSION}.jar"
          cp "$JAR" "$FINAL"
          ls -la output
          echo "artifact_name=${MOD_ID}-${MOD_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload final mod JAR
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.collect.outputs.artifact_name }}
          path: output/*.jar
          if-no-files-found: error
          retention-days: 30
